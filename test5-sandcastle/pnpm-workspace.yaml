packages:
  - 'packages/*'
  - 'apps/*'
  - 'tools/*'
allowBuilds:
  '@parcel/watcher': true
  cpu-features: false
  esbuild: true
  msgpackr-extract: true
  protobufjs: false
  ssh2: false
  unrs-resolver: true
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - msgpackr-extract
  - unrs-resolver
